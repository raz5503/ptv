<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mosaic Video Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b0d10;
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-container {
      width: 100%;
      max-width: 1440px;
      background: #12161e;
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid #252d3a;
      padding: 1.5rem 2rem;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #2d333c;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 600;
      font-size: 1.2rem;
      color: #f0f2f5;
      white-space: nowrap;
    }
    .brand i {
      color: #6c8cff;
      font-size: 1.5rem;
    }
    .badge-count {
      background: #2d3748;
      padding: 0.15rem 0.9rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b9c8f0;
      border: 1px solid #3e485e;
      white-space: nowrap;
    }
    .badge-count span {
      color: white;
      font-weight: 700;
      margin-left: 4px;
    }

    .input-area {
      flex: 1;
      min-width: 200px;
      background: #1a1f27;
      padding: 0.4rem 1.2rem 0.4rem 1rem;
      border-radius: 4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #2a313c;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .input-area i {
      color: #6c8cff;
      font-size: 0.9rem;
    }
    .input-area input {
      flex: 1;
      min-width: 120px;
      background: transparent;
      border: none;
      padding: 0.5rem 0.2rem;
      color: #f0f2f5;
      font-size: 0.9rem;
      outline: none;
    }
    .input-area input::placeholder {
      color: #7a8395;
      font-weight: 300;
      font-size: 0.85rem;
    }
    .submit-btn {
      background: #3b4b7a;
      border: none;
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #5e74b0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .submit-btn:hover {
      background: #4f63a0;
      transform: scale(1.02);
    }

    .column-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #12171f;
      padding: 0.3rem 1.2rem;
      border-radius: 3rem;
      border: 1px solid #29313d;
      white-space: nowrap;
    }
    .column-controls label {
      font-weight: 400;
      color: #b0bedb;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .column-controls select {
      background: #202833;
      border: 1px solid #3c465a;
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }
    .column-controls select option {
      background: #1e2530;
    }

    .clear-btn {
      background: #2f1e2a;
      border: none;
      color: #f0b3b3;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #572e3a;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .clear-btn:hover {
      background: #4a2c38;
      color: #ffcaca;
      border-color: #a14b5e;
    }

    .mosaic-grid {
      display: grid;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .video-card {
      background: #141a22;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.7);
      border: 1px solid #2a313e;
      transition: transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .video-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px #000000cc;
      border-color: #4d5a73;
    }

    .iframe-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #0b0e12;
    }
    .iframe-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0c0f;
      transition: filter 0.3s ease;
    }

    .video-title {
      background: #1a212b;
      padding: 0.5rem 1rem 0.3rem 1rem;
      font-size: 0.75rem;
      color: #afc0e3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px solid #2b3341;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .video-title .url-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      font-weight: 300;
      color: #8d9fc7;
    }
    .video-title .copy-btn {
      background: transparent;
      border: none;
      color: #6c8cff;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .video-title .copy-btn:hover {
      background: #1a2a4a;
      color: #8cacff;
    }
    .video-title .copy-btn.copied {
      color: #4caf50;
    }
    .video-title .copy-btn.copied:hover {
      background: #1a3a2a;
      color: #66bb6a;
    }

    .filter-controls {
      background: #10161e;
      padding: 0.5rem 0.8rem;
      border-top: 1px solid #28303d;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.8rem;
    }
    .filter-controls .filter-checkbox {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #a5b6da;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .filter-controls .filter-checkbox input[type="checkbox"] {
      accent-color: #6c8cff;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .filter-controls .filter-group {
      display: flex;
      align-items: center;
      gap: 0.3rem 0.6rem;
      flex-wrap: wrap;
    }
    .filter-controls .filter-group label {
      color: #7a8395;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .filter-controls .filter-group input[type="range"] {
      width: 60px;
      height: 4px;
      -webkit-appearance: none;
      background: #2d3748;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    .filter-controls .filter-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6c8cff;
      cursor: pointer;
    }
    .filter-controls .filter-group input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6c8cff;
      cursor: pointer;
      border: none;
    }
    .filter-controls .filter-value {
      color: #afc0e3;
      font-size: 0.6rem;
      min-width: 24px;
      text-align: center;
    }

    .filter-controls .reset-btn {
      background: #2f1e2a;
      border: none;
      color: #f0b3b3;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #572e3a;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      margin-left: auto;
    }
    .filter-controls .reset-btn:hover {
      background: #4a2c38;
      color: #ffcaca;
      border-color: #a14b5e;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.6rem;
      padding: 0.3rem 0.8rem 0.4rem;
      background: #10161e;
      border-top: 1px solid #28303d;
    }
    .card-actions button {
      background: transparent;
      border: none;
      color: #a5b6da;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
    }
    .card-actions button:hover {
      color: white;
      background: #2b3547;
    }
    .card-actions .delete-btn {
      color: #d97a8a;
    }
    .card-actions .delete-btn:hover {
      background: #3f2530;
      color: #ff9eae;
    }
    .fullscreen-btn {
      color: #b0c7f0;
    }
    .fullscreen-btn:hover {
      background: #2d3a52;
    }
    .reload-btn {
      color: #6c8cff;
    }
    .reload-btn:hover {
      background: #1a2a4a;
      color: #8cacff;
    }

    .empty-mosaic {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: #6b7a96;
      background: #12171f;
      border-radius: 3rem;
      border: 1px dashed #31405a;
    }
    .empty-mosaic i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a212b;
      color: #afc0e3;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-size: 0.85rem;
      border: 1px solid #2d3748;
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast i {
      color: #4caf50;
      margin-right: 8px;
    }

    @media (max-width: 900px) {
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .input-area {
        flex-wrap: wrap;
      }
      .input-area input {
        min-width: 100px;
      }
      .filter-controls .filter-group input[type="range"] {
        width: 40px;
      }
    }
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .main-container { padding: 1rem; }
      .mosaic-grid { grid-template-columns: 1fr !important; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .column-controls { justify-content: center; }
      .filter-controls { flex-direction: column; align-items: stretch; }
      .filter-controls .reset-btn { margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="main-container">

  <div class="top-bar">
    <div class="brand">
      <i class="fas fa-th-large"></i>
      <span>Mosaic</span>
      <span class="badge-count"><i class="far fa-play-circle"></i> <span id="videoCounter">0</span></span>
    </div>

    <div class="input-area">
      <i class="fas fa-link"></i>
      <input type="url" id="urlInput" placeholder="Paste video URL" spellcheck="false">
      <button class="submit-btn" id="addVideoBtn"><i class="fas fa-plus-circle"></i> Add</button>
    </div>

    <div class="column-controls">
      <label><i class="fas fa-columns"></i> Cols</label>
      <select id="columnSelect">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
    </div>

    <button class="clear-btn" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Clear</button>
  </div>

  <div class="mosaic-grid" id="mosaicGrid"></div>

</div>

<!-- Toast Notification -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMessage">Link copied!</span></div>

<script>
  (function() {
    const STORAGE_KEY = 'mosaic_video_urls';
    const COLUMN_KEY = 'mosaic_column_count';
    const FILTERS_KEY = 'mosaic_video_filters';
    const grid = document.getElementById('mosaicGrid');
    const urlInput = document.getElementById('urlInput');
    const addBtn = document.getElementById('addVideoBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const columnSelect = document.getElementById('columnSelect');
    const counterSpan = document.getElementById('videoCounter');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    let videoUrls = [];
    let videoFilters = {};
    let saveTimeout = null;
    let toastTimeout = null;

    // ----- TOAST FUNCTION -----
    function showToast(message) {
      toastMessage.textContent = message;
      toast.classList.add('show');
      if (toastTimeout) {
        clearTimeout(toastTimeout);
      }
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // ----- COPY FUNCTION -----
    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showToast('Link copied to clipboard!');
        }).catch(() => {
          // Fallback
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast('Link copied to clipboard!');
      } catch (err) {
        showToast('Failed to copy link');
      }
      document.body.removeChild(textarea);
    }

    // ----- DEBOUNCED SAVE FUNCTION -----
    function debouncedSaveFilters() {
      if (saveTimeout) {
        clearTimeout(saveTimeout);
      }
      saveTimeout = setTimeout(() => {
        localStorage.setItem(FILTERS_KEY, JSON.stringify(videoFilters));
        saveTimeout = null;
      }, 500);
    }

    // ----- SAVE FUNCTIONS -----
    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(videoUrls));
    }

    function loadFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) {
            videoUrls = parsed;
            return;
          }
        } catch (e) {}
      }
      videoUrls = [];
    }

    function saveFiltersToStorage() {
      localStorage.setItem(FILTERS_KEY, JSON.stringify(videoFilters));
    }

    function loadFiltersFromStorage() {
      const stored = localStorage.getItem(FILTERS_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (typeof parsed === 'object') {
            videoFilters = parsed;
            return;
          }
        } catch (e) {}
      }
      videoFilters = {};
    }

    function saveColumnToStorage(cols) {
      localStorage.setItem(COLUMN_KEY, String(cols));
    }

    function loadColumnFromStorage() {
      const stored = localStorage.getItem(COLUMN_KEY);
      if (stored) {
        const val = parseInt(stored, 10);
        if (val === 1 || val === 2 || val === 3 || val === 4 || val === 5 || val === 6) {
          return val;
        }
      }
      return 3;
    }

    function getFilterId(url, index) {
      return `filter_${index}_${url.substring(0, 20)}`;
    }

    function getDefaultFilters() {
      return {
        enabled: false,
        brightness: 100,
        contrast: 100,
        saturation: 100,
        hue: 0
      };
    }

    function getFilterForVideo(index, url) {
      const id = getFilterId(url, index);
      if (videoFilters[id]) {
        return videoFilters[id];
      }
      const defaults = getDefaultFilters();
      videoFilters[id] = { ...defaults };
      return videoFilters[id];
    }

    function applyFilterToIframe(iframe, filters) {
      if (!iframe) return;
      if (filters.enabled) {
        const b = filters.brightness / 100;
        const c = filters.contrast / 100;
        const s = filters.saturation / 100;
        const h = filters.hue;
        iframe.style.filter = `brightness(${b}) contrast(${c}) saturate(${s}) hue-rotate(${h}deg)`;
      } else {
        iframe.style.filter = 'none';
      }
    }

    function resetFilters(filters, iframe, checkbox, bInput, cInput, sInput, hInput, bValue, cValue, sValue, hValue) {
      filters.enabled = false;
      filters.brightness = 100;
      filters.contrast = 100;
      filters.saturation = 100;
      filters.hue = 0;
      
      checkbox.checked = false;
      bInput.value = 100;
      cInput.value = 100;
      sInput.value = 100;
      hInput.value = 0;
      bValue.textContent = '100%';
      cValue.textContent = '100%';
      sValue.textContent = '100%';
      hValue.textContent = '0°';
      
      applyFilterToIframe(iframe, filters);
      saveFiltersToStorage();
    }

    function createVideoCard(url, index) {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.dataset.index = index;

      const titleDiv = document.createElement('div');
      titleDiv.className = 'video-title';
      const urlSpan = document.createElement('span');
      urlSpan.className = 'url-text';
      urlSpan.textContent = url;
      titleDiv.appendChild(urlSpan);

      // Copy Button
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
      copyBtn.setAttribute('aria-label', 'Copy video link');
      copyBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        copyToClipboard(url);
        this.classList.add('copied');
        setTimeout(() => {
          this.classList.remove('copied');
        }, 2000);
      });
      titleDiv.appendChild(copyBtn);

      const wrapper = document.createElement('div');
      wrapper.className = 'iframe-wrapper';
      const iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.allowFullscreen = true;
      iframe.loading = 'lazy';
      iframe.setAttribute('allow', 'fullscreen');
      wrapper.appendChild(iframe);

      const filterControls = document.createElement('div');
      filterControls.className = 'filter-controls';

      const filterId = getFilterId(url, index);
      const filters = getFilterForVideo(index, url);

      // Checkbox
      const checkboxLabel = document.createElement('label');
      checkboxLabel.className = 'filter-checkbox';
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = filters.enabled || false;
      checkbox.addEventListener('change', function() {
        filters.enabled = this.checked;
        applyFilterToIframe(iframe, filters);
        saveFiltersToStorage();
      });
      checkboxLabel.appendChild(checkbox);
      checkboxLabel.appendChild(document.createTextNode('Color'));

      // Brightness
      const brightnessGroup = document.createElement('div');
      brightnessGroup.className = 'filter-group';
      const bLabel = document.createElement('label');
      bLabel.textContent = 'Bright';
      const bInput = document.createElement('input');
      bInput.type = 'range';
      bInput.min = '0';
      bInput.max = '200';
      bInput.value = filters.brightness || 100;
      const bValue = document.createElement('span');
      bValue.className = 'filter-value';
      bValue.textContent = bInput.value + '%';
      bInput.addEventListener('input', function() {
        filters.brightness = parseInt(this.value, 10);
        bValue.textContent = this.value + '%';
        if (filters.enabled) {
          applyFilterToIframe(iframe, filters);
        }
        debouncedSaveFilters();
      });
      brightnessGroup.appendChild(bLabel);
      brightnessGroup.appendChild(bInput);
      brightnessGroup.appendChild(bValue);

      // Contrast
      const contrastGroup = document.createElement('div');
      contrastGroup.className = 'filter-group';
      const cLabel = document.createElement('label');
      cLabel.textContent = 'Contrast';
      const cInput = document.createElement('input');
      cInput.type = 'range';
      cInput.min = '0';
      cInput.max = '200';
      cInput.value = filters.contrast || 100;
      const cValue = document.createElement('span');
      cValue.className = 'filter-value';
      cValue.textContent = cInput.value + '%';
      cInput.addEventListener('input', function() {
        filters.contrast = parseInt(this.value, 10);
        cValue.textContent = this.value + '%';
        if (filters.enabled) {
          applyFilterToIframe(iframe, filters);
        }
        debouncedSaveFilters();
      });
      contrastGroup.appendChild(cLabel);
      contrastGroup.appendChild(cInput);
      contrastGroup.appendChild(cValue);

      // Saturation
      const saturationGroup = document.createElement('div');
      saturationGroup.className = 'filter-group';
      const sLabel = document.createElement('label');
      sLabel.textContent = 'Saturate';
      const sInput = document.createElement('input');
      sInput.type = 'range';
      sInput.min = '0';
      sInput.max = '200';
      sInput.value = filters.saturation || 100;
      const sValue = document.createElement('span');
      sValue.className = 'filter-value';
      sValue.textContent = sInput.value + '%';
      sInput.addEventListener('input', function() {
        filters.saturation = parseInt(this.value, 10);
        sValue.textContent = this.value + '%';
        if (filters.enabled) {
          applyFilterToIframe(iframe, filters);
        }
        debouncedSaveFilters();
      });
      saturationGroup.appendChild(sLabel);
      saturationGroup.appendChild(sInput);
      saturationGroup.appendChild(sValue);

      // Hue
      const hueGroup = document.createElement('div');
      hueGroup.className = 'filter-group';
      const hLabel = document.createElement('label');
      hLabel.textContent = 'Hue';
      const hInput = document.createElement('input');
      hInput.type = 'range';
      hInput.min = '0';
      hInput.max = '360';
      hInput.value = filters.hue || 0;
      const hValue = document.createElement('span');
      hValue.className = 'filter-value';
      hValue.textContent = hInput.value + '°';
      hInput.addEventListener('input', function() {
        filters.hue = parseInt(this.value, 10);
        hValue.textContent = this.value + '°';
        if (filters.enabled) {
          applyFilterToIframe(iframe, filters);
        }
        debouncedSaveFilters();
      });
      hueGroup.appendChild(hLabel);
      hueGroup.appendChild(hInput);
      hueGroup.appendChild(hValue);

      // Reset Button
      const resetBtn = document.createElement('button');
      resetBtn.className = 'reset-btn';
      resetBtn.innerHTML = '<i class="fas fa-undo-alt"></i> Reset';
      resetBtn.addEventListener('click', function() {
        resetFilters(filters, iframe, checkbox, bInput, cInput, sInput, hInput, bValue, cValue, sValue, hValue);
      });

      filterControls.appendChild(checkboxLabel);
      filterControls.appendChild(brightnessGroup);
      filterControls.appendChild(contrastGroup);
      filterControls.appendChild(saturationGroup);
      filterControls.appendChild(hueGroup);
      filterControls.appendChild(resetBtn);

      applyFilterToIframe(iframe, filters);

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'card-actions';

      const fsBtn = document.createElement('button');
      fsBtn.className = 'fullscreen-btn';
      fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
      fsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const iframeEl = wrapper.querySelector('iframe');
        if (iframeEl) {
          if (iframeEl.requestFullscreen) {
            iframeEl.requestFullscreen();
          } else if (iframeEl.webkitRequestFullscreen) {
            iframeEl.webkitRequestFullscreen();
          } else if (iframeEl.msRequestFullscreen) {
            iframeEl.msRequestFullscreen();
          }
        }
      });

      const reloadBtn = document.createElement('button');
      reloadBtn.className = 'reload-btn';
      reloadBtn.innerHTML = '<i class="fas fa-sync-alt"></i>';
      reloadBtn.setAttribute('aria-label', 'Reload video');
      reloadBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const iframeEl = wrapper.querySelector('iframe');
        if (iframeEl) {
          const currentSrc = iframeEl.src;
          iframeEl.src = 'about:blank';
          setTimeout(() => {
            iframeEl.src = currentSrc;
          }, 100);
        }
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerHTML = '<i class="fas fa-times-circle"></i>';
      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        const cardElement = this.closest('.video-card');
        const idx = parseInt(cardElement.dataset.index, 10);
        
        const filterIdToRemove = getFilterId(url, idx);
        delete videoFilters[filterIdToRemove];
        saveFiltersToStorage();
        
        videoUrls.splice(idx, 1);
        saveToStorage();
        
        cardElement.remove();
        
        document.querySelectorAll('.video-card').forEach((card, newIndex) => {
          card.dataset.index = newIndex;
        });
        
        updateCounter();
        
        if (videoUrls.length === 0) {
          showEmptyState();
        }
      });

      actionsDiv.appendChild(fsBtn);
      actionsDiv.appendChild(reloadBtn);
      actionsDiv.appendChild(delBtn);

      card.appendChild(titleDiv);
      card.appendChild(wrapper);
      card.appendChild(filterControls);
      card.appendChild(actionsDiv);
      return card;
    }

    function showEmptyState() {
      grid.innerHTML = '';
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty-mosaic';
      emptyDiv.innerHTML = `
        <i class="fas fa-video"></i>
        <p style="font-size:1.1rem; margin-top:0.5rem;">No videos added yet</p>
        <p style="font-size:0.9rem; color:#4e6080;">Add a URL above to build your mosaic</p>
      `;
      grid.appendChild(emptyDiv);
      counterSpan.textContent = '0';
    }

    function updateCounter() {
      const visibleCards = grid.querySelectorAll('.video-card');
      counterSpan.textContent = visibleCards.length;
    }

    function renderFullGrid() {
      const cols = parseInt(columnSelect.value, 10);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.innerHTML = '';

      if (videoUrls.length === 0) {
        showEmptyState();
        return;
      }

      counterSpan.textContent = videoUrls.length;

      videoUrls.forEach((url, index) => {
        const card = createVideoCard(url, index);
        grid.appendChild(card);
      });
    }

    function updateColumnOnly() {
      const cols = parseInt(columnSelect.value, 10);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      saveColumnToStorage(cols);
    }

    function addVideoWithoutRefresh() {
      let rawUrl = urlInput.value.trim();
      if (!rawUrl) {
        urlInput.placeholder = 'Enter URL';
        setTimeout(() => {
          urlInput.placeholder = 'Paste video URL';
        }, 2000);
        return;
      }

      if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
        rawUrl = 'https://' + rawUrl;
      }

      try {
        new URL(rawUrl);
      } catch (_) {
        urlInput.placeholder = 'Invalid URL';
        setTimeout(() => {
          urlInput.placeholder = 'Paste video URL';
        }, 2000);
        return;
      }

      videoUrls.push(rawUrl);
      saveToStorage();

      const emptyDiv = grid.querySelector('.empty-mosaic');
      if (emptyDiv) {
        emptyDiv.remove();
      }

      const cols = parseInt(columnSelect.value, 10);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

      const newIndex = videoUrls.length - 1;
      const newCard = createVideoCard(rawUrl, newIndex);
      grid.appendChild(newCard);

      updateCounter();

      urlInput.value = '';
      urlInput.focus();
    }

    function clearAllVideos() {
      if (videoUrls.length === 0) return;
      if (confirm('Remove all videos from mosaic?')) {
        videoUrls = [];
        videoFilters = {};
        saveToStorage();
        saveFiltersToStorage();
        showEmptyState();
      }
    }

    function init() {
      loadFromStorage();
      loadFiltersFromStorage();

      const savedCols = loadColumnFromStorage();
      columnSelect.value = String(savedCols);
      grid.style.gridTemplateColumns = `repeat(${savedCols}, 1fr)`;

      addBtn.addEventListener('click', (e) => {
        e.preventDefault();
        addVideoWithoutRefresh();
      });

      urlInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addVideoWithoutRefresh();
        }
      });

      clearAllBtn.addEventListener('click', clearAllVideos);

      columnSelect.addEventListener('change', function() {
        updateColumnOnly();
      });

      renderFullGrid();
    }

    init();
  })();
</script>

</body>
</html>
