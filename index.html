<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mosaic Video Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b0d10;
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-container {
      width: 100%;
      max-width: 1440px;
      background: #12161e;
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid #252d3a;
      padding: 1.5rem 2rem;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #2d333c;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 600;
      font-size: 1.2rem;
      color: #f0f2f5;
      white-space: nowrap;
    }
    .brand i {
      color: #6c8cff;
      font-size: 1.5rem;
    }
    .badge-count {
      background: #2d3748;
      padding: 0.15rem 0.9rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b9c8f0;
      border: 1px solid #3e485e;
      white-space: nowrap;
    }
    .badge-count span {
      color: white;
      font-weight: 700;
      margin-left: 4px;
    }

    .input-area {
      flex: 1;
      min-width: 200px;
      background: #1a1f27;
      padding: 0.4rem 1.2rem 0.4rem 1rem;
      border-radius: 4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #2a313c;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .input-area i {
      color: #6c8cff;
      font-size: 0.9rem;
    }
    .input-area input {
      flex: 1;
      min-width: 120px;
      background: transparent;
      border: none;
      padding: 0.5rem 0.2rem;
      color: #f0f2f5;
      font-size: 0.9rem;
      outline: none;
    }
    .input-area input::placeholder {
      color: #7a8395;
      font-weight: 300;
      font-size: 0.85rem;
    }
    .submit-btn {
      background: #3b4b7a;
      border: none;
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #5e74b0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .submit-btn:hover {
      background: #4f63a0;
      transform: scale(1.02);
    }

    .column-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #12171f;
      padding: 0.3rem 1.2rem;
      border-radius: 3rem;
      border: 1px solid #29313d;
      white-space: nowrap;
    }
    .column-controls label {
      font-weight: 400;
      color: #b0bedb;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .column-controls select {
      background: #202833;
      border: 1px solid #3c465a;
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }
    .column-controls select option {
      background: #1e2530;
    }

    .clear-btn {
      background: #2f1e2a;
      border: none;
      color: #f0b3b3;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #572e3a;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .clear-btn:hover {
      background: #4a2c38;
      color: #ffcaca;
      border-color: #a14b5e;
    }

    .mosaic-grid {
      display: grid;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .video-card {
      background: #141a22;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.7);
      border: 1px solid #2a313e;
      transition: transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .video-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px #000000cc;
      border-color: #4d5a73;
    }

    .iframe-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #0b0e12;
    }
    .iframe-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0c0f;
    }

    .video-title {
      background: #1a212b;
      padding: 0.5rem 1rem 0.3rem 1rem;
      font-size: 0.75rem;
      color: #afc0e3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px solid #2b3341;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .video-title span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
      display: inline-block;
    }
    .video-title .url-text {
      font-weight: 300;
      color: #8d9fc7;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0.8rem 0.5rem;
      background: #10161e;
      border-top: 1px solid #28303d;
    }
    .card-actions button {
      background: transparent;
      border: none;
      color: #a5b6da;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      padding: 0.2rem 0.4rem;
      border-radius: 8px;
    }
    .card-actions button:hover {
      color: white;
      background: #2b3547;
    }
    .card-actions .delete-btn {
      color: #d97a8a;
    }
    .card-actions .delete-btn:hover {
      background: #3f2530;
      color: #ff9eae;
    }
    .fullscreen-btn {
      color: #b0c7f0;
    }
    .fullscreen-btn:hover {
      background: #2d3a52;
    }

    .empty-mosaic {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: #6b7a96;
      background: #12171f;
      border-radius: 3rem;
      border: 1px dashed #31405a;
    }
    .empty-mosaic i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    @media (max-width: 900px) {
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .input-area {
        flex-wrap: wrap;
      }
      .input-area input {
        min-width: 100px;
      }
    }
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .main-container { padding: 1rem; }
      .mosaic-grid { grid-template-columns: 1fr !important; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .column-controls { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="main-container">

  <div class="top-bar">
    <div class="brand">
      <i class="fas fa-th-large"></i>
      <span>Mosaic</span>
      <span class="badge-count"><i class="far fa-play-circle"></i> <span id="videoCounter">0</span></span>
    </div>

    <div class="input-area">
      <i class="fas fa-link"></i>
      <input type="url" id="urlInput" placeholder="Paste video URL" spellcheck="false">
      <button class="submit-btn" id="addVideoBtn"><i class="fas fa-plus-circle"></i> Add</button>
    </div>

    <div class="column-controls">
      <label><i class="fas fa-columns"></i> Cols</label>
      <select id="columnSelect">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="6">6</option>
      </select>
    </div>

    <button class="clear-btn" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Clear</button>
  </div>

  <div class="mosaic-grid" id="mosaicGrid"></div>

</div>

<script>
  (function() {
    const STORAGE_KEY = 'mosaic_video_urls';
    const COLUMN_KEY = 'mosaic_column_count';
    const grid = document.getElementById('mosaicGrid');
    const urlInput = document.getElementById('urlInput');
    const addBtn = document.getElementById('addVideoBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const columnSelect = document.getElementById('columnSelect');
    const counterSpan = document.getElementById('videoCounter');

    let videoUrls = [];

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(videoUrls));
    }

    function loadFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) {
            videoUrls = parsed;
            return;
          }
        } catch (e) {}
      }
      videoUrls = [];
    }

    function saveColumnToStorage(cols) {
      localStorage.setItem(COLUMN_KEY, String(cols));
    }

    function loadColumnFromStorage() {
      const stored = localStorage.getItem(COLUMN_KEY);
      if (stored) {
        const val = parseInt(stored, 10);
        if (val === 2 || val === 3 || val === 4 || val === 6) {
          return val;
        }
      }
      return 3;
    }

    function createVideoCard(url, index) {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.dataset.index = index;

      const titleDiv = document.createElement('div');
      titleDiv.className = 'video-title';
      const urlSpan = document.createElement('span');
      urlSpan.className = 'url-text';
      urlSpan.textContent = url;
      titleDiv.appendChild(urlSpan);

      const wrapper = document.createElement('div');
      wrapper.className = 'iframe-wrapper';
      const iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.allowFullscreen = true;
      iframe.loading = 'lazy';
      iframe.setAttribute('allow', 'fullscreen');
      wrapper.appendChild(iframe);

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'card-actions';

      const fsBtn = document.createElement('button');
      fsBtn.className = 'fullscreen-btn';
      fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
      fsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const iframeEl = wrapper.querySelector('iframe');
        if (iframeEl) {
          if (iframeEl.requestFullscreen) {
            iframeEl.requestFullscreen();
          } else if (iframeEl.webkitRequestFullscreen) {
            iframeEl.webkitRequestFullscreen();
          } else if (iframeEl.msRequestFullscreen) {
            iframeEl.msRequestFullscreen();
          }
        }
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerHTML = '<i class="fas fa-times-circle"></i>';
      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        const cardElement = this.closest('.video-card');
        const idx = parseInt(cardElement.dataset.index, 10);
        
        // Remove from array
        videoUrls.splice(idx, 1);
        saveToStorage();
        
        // Remove card from DOM
        cardElement.remove();
        
        // Update indices of remaining cards
        document.querySelectorAll('.video-card').forEach((card, newIndex) => {
          card.dataset.index = newIndex;
        });
        
        // Update counter
        updateCounter();
        
        // Show empty state if no videos
        if (videoUrls.length === 0) {
          showEmptyState();
        }
      });

      actionsDiv.appendChild(fsBtn);
      actionsDiv.appendChild(delBtn);

      card.appendChild(titleDiv);
      card.appendChild(wrapper);
      card.appendChild(actionsDiv);
      return card;
    }

    function showEmptyState() {
      grid.innerHTML = '';
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty-mosaic';
      emptyDiv.innerHTML = `
        <i class="fas fa-video"></i>
        <p style="font-size:1.1rem; margin-top:0.5rem;">No videos added yet</p>
        <p style="font-size:0.9rem; color:#4e6080;">Add a URL above to build your mosaic</p>
      `;
      grid.appendChild(emptyDiv);
      counterSpan.textContent = '0';
    }

    function updateCounter() {
      const visibleCards = grid.querySelectorAll('.video-card');
      counterSpan.textContent = visibleCards.length;
    }

    function renderFullGrid() {
      const cols = parseInt(columnSelect.value, 10);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.innerHTML = '';

      if (videoUrls.length === 0) {
        showEmptyState();
        return;
      }

      counterSpan.textContent = videoUrls.length;

      videoUrls.forEach((url, index) => {
        const card = createVideoCard(url, index);
        grid.appendChild(card);
      });
    }

    function updateColumnOnly() {
      const cols = parseInt(columnSelect.value, 10);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      saveColumnToStorage(cols);
    }

    function addVideoWithoutRefresh() {
      let rawUrl = urlInput.value.trim();
      if (!rawUrl) {
        urlInput.placeholder = 'Enter URL';
        setTimeout(() => {
          urlInput.placeholder = 'Paste video URL';
        }, 2000);
        return;
      }

      if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
        rawUrl = 'https://' + rawUrl;
      }

      try {
        new URL(rawUrl);
      } catch (_) {
        urlInput.placeholder = 'Invalid URL';
        setTimeout(() => {
          urlInput.placeholder = 'Paste video URL';
        }, 2000);
        return;
      }

      videoUrls.push(rawUrl);
      saveToStorage();

      // Remove empty state if exists
      const emptyDiv = grid.querySelector('.empty-mosaic');
      if (emptyDiv) {
        emptyDiv.remove();
      }

      const cols = parseInt(columnSelect.value, 10);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

      const newIndex = videoUrls.length - 1;
      const newCard = createVideoCard(rawUrl, newIndex);
      grid.appendChild(newCard);

      updateCounter();

      urlInput.value = '';
      urlInput.focus();
    }

    function clearAllVideos() {
      if (videoUrls.length === 0) return;
      if (confirm('Remove all videos from mosaic?')) {
        videoUrls = [];
        saveToStorage();
        showEmptyState();
      }
    }

    function init() {
      loadFromStorage();

      const savedCols = loadColumnFromStorage();
      columnSelect.value = String(savedCols);
      grid.style.gridTemplateColumns = `repeat(${savedCols}, 1fr)`;

      addBtn.addEventListener('click', (e) => {
        e.preventDefault();
        addVideoWithoutRefresh();
      });

      urlInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addVideoWithoutRefresh();
        }
      });

      clearAllBtn.addEventListener('click', clearAllVideos);

      columnSelect.addEventListener('change', function() {
        updateColumnOnly();
      });

      renderFullGrid();
    }

    init();
  })();
</script>

</body>
</html>
